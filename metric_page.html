<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Search Bar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex; /* Use flexbox for centering */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            min-height: 100vh; /* Make body take full viewport height */
        }

        .search-container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .search-container h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .search-container input[type="text"] {
            width: 300px;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box; /* Include padding in width */
        }

        .search-container button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s ease;
        }

        .search-container button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>Welcome! How can I help?</h1>
        <input type="text" id = "input" placeholder="Search...">
        <button type="submit" id = "find">Search</button>
    </div>

</body>
<script>
    const input = document.getElementById("input");
    const button = document.getElementById("find");

    button.addEventListener("click", async () => {
        const searchText = input.value;  // Get the user-entered text
        console.log("User searched for:", searchText);

        try {
        const response = await fetch('database.txt');
        const data = await response.text();
        console.log("Looked for it", data);
        } catch (err) {
            console.error(err);
        }
    });

        // You can do anything with searchText here:
        // e.g., filter content, query your JSON, redirect, etc.

</script>
</html>
