<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="search.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Search Bar</title>
</head>
<body>

    <div class="search-container">
        <h1>Welcome! How can I help?</h1>
        <input type="text" id = "input" placeholder="Search...">
        <button type="submit" id = "find">Search</button>
    </div>

</body>
<script>
    const input = document.getElementById("input");
    const button = document.getElementById("find");

    button.addEventListener("click", async () => {
    const searchText = input.value.trim();
    console.log("User searched for:", searchText);

    let data = "";
    try {
        const response = await fetch('database.txt');
        data = await response.text();
        console.log("File loaded, length:", data.length);
    } catch (err) {
        console.error(err);
        return;
    }

    // Split into blocks
    const blocks = data.split("---");

    // Filter blocks case-insensitively
    const matches = blocks
        .filter(block => block.toLowerCase().includes(searchText.toLowerCase())); // add back the \begin{

    console.log("Matches found:", matches.length);

    // Store results
    localStorage.setItem("results", JSON.stringify(matches));
    localStorage.setItem("lastSearch", searchText);

    window.location.href = "metric_results.html";
});

        // You can do anything with searchText here:
        // e.g., filter content, query your JSON, redirect, etc.

</script>
</html>
